<nav class="fixed inset-x-0 top-0 z-50 px-4 pt-4 sm:px-6">
  <div class="mx-auto max-w-6xl">
    <div class="nav-shell" [class.nav-shell--scrolled]="scrolled() || isMenuOpen()">
      <a
        href="#home-section"
        (click)="scrollToSection('home-section', $event)"
        class="flex items-center gap-3 text-white"
      >
        <span class="brand-mark">
          <img
            src="assets/images/HGFavicon2.png"
            alt="HG monogram"
            class="h-8 w-8 object-contain"
          />
        </span>

        <span class="min-w-0">
          <span class="block font-heading text-sm uppercase tracking-[0.28em] text-white/50">
            Portfolio
          </span>
          <span class="block truncate text-sm font-semibold text-white sm:text-base">
            Huvashen Gramani
          </span>
        </span>
      </a>

      <div class="hidden items-center gap-2 md:flex">
        <a
          *ngFor="let item of navItems"
          [attr.href]="'#' + item.id"
          (click)="scrollToSection(item.id, $event)"
          class="nav-link"
          [class.is-active]="activeSection() === item.id"
        >
          {{ item.label }}
        </a>

        <a
          href="#contact-section"
          (click)="scrollToSection('contact-section', $event)"
          class="nav-cta"
        >
          Let's talk
        </a>
      </div>

      <button
        type="button"
        class="nav-toggle md:hidden"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen()"
        aria-label="Toggle navigation menu"
      >
        <span class="nav-toggle__line" [class.nav-toggle__line--top]="isMenuOpen()"></span>
        <span class="nav-toggle__line" [class.nav-toggle__line--middle]="isMenuOpen()"></span>
        <span class="nav-toggle__line" [class.nav-toggle__line--bottom]="isMenuOpen()"></span>
      </button>
    </div>

    <div *ngIf="isMenuOpen()" class="mobile-panel md:hidden">
      <a
        *ngFor="let item of navItems"
        [attr.href]="'#' + item.id"
        (click)="scrollToSection(item.id, $event)"
        class="mobile-link"
        [class.is-active]="activeSection() === item.id"
      >
        {{ item.label }}
      </a>
    </div>
  </div>
</nav>
